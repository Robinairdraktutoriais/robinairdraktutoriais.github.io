<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ofertas do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    header {
      background: #2ecc71;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 15px;
    }

    .produto {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .produto h2 {
      margin: 0 0 10px;
    }

    .preco {
      color: #e74c3c;
      font-size: 20px;
      font-weight: bold;
    }

    .botao {
      display: inline-block;
      margin-top: 10px;
      background: #3498db;
      color: white;
      padding: 10px;
      border-radius: 5px;
      text-decoration: none;
    }

    .botao:hover {
      background: #2980b9;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  🛒 Ofertas do Dia - Economize Agora
</header>

<div class="container">

  <div class="produto">
    <h2>Arroz 5kg</h2>
    <p class="preco">R$ 19,90</p>
    <a class="botao" href="#">Ver Oferta</a>
  </div>

  <div class="produto">
    <h2>Óleo de Soja 900ml</h2>
    <p class="preco">R$ 4,99</p>
    <a class="botao" href="#">Ver Oferta</a>
  </div>

  <div class="produto">
    <h2>Feijão 1kg</h2>
    <p class="preco">R$ 6,49</p>
    <a class="botao" href="#">Ver Oferta</a>
  </div>

</div>

<footer>
  Site de ofertas atualizado diariamente
</footer>

</body>
</html>
