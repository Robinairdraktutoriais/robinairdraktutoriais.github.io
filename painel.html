<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel SMM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <!-- Header -->
  <nav class="bg-gray-900 border-b border-gray-800 px-4 py-3 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold">Painel SMM</h1>
      <div class="flex items-center gap-4">
        <div class="text-right hidden sm:block">
          <p class="text-xs text-gray-400">Saldo disponível</p>
          <p class="font-bold text-green-400">R$ <span id="balance">0,00</span></p>
        </div>
        <a href="adicionar-saldo.html" class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded-lg text-sm">+ Saldo</a>
        <button id="logout" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm">Sair</button>
      </div>
    </div>
  </nav>

  <!-- Conteúdo -->
  <main class="max-w-7xl mx-auto p-4 grid lg:grid-cols-3 gap-6 mt-4">

    <!-- Coluna 1: Novo Pedido -->
    <div class="lg:col-span-2 bg-gray-900 border border-gray-800 rounded-xl p-6">
      <h2 class="text-xl font-bold mb-4">Fazer Novo Pedido</h2>
      <form id="order-form" class="space-y-4">
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-2 text-gray-300">Categoria</label>
            <select id="category" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg">
              <option>Carregando...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm mb-2 text-gray-300">Serviço</label>
            <select id="service" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg">
              <option>Selecione categoria</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm mb-2 text-gray-300">Link do perfil/post</label>
          <input type="url" id="link" required placeholder="https://instagram.com/..." class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg">
        </div>

        <div>
          <label class="block text-sm mb-2 text-gray-300">Quantidade</label>
          <input type="number" id="quantity" required class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg">
          <p id="limits" class="text-xs text-gray-400 mt-1"></p>
        </div>

        <div class="bg-gray-800 p-4 rounded-lg flex justify-between items-center">
          <div>
            <p class="text-sm text-gray-400">Você pagará</p>
            <p class="text-2xl font-bold text-blue-400">R$ <span id="total">0,00</span></p>
          </div>
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-semibold">
            Enviar Pedido
          </button>
        </div>
        <div id="msg" class="hidden text-sm p-3 rounded-lg"></div>
      </form>
    </div>

    <!-- Coluna 2: Histórico -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
      <h2 class="text-xl font-bold mb-4">Últimos Pedidos</h2>
      <div id="orders-list" class="space-y-3 max-h-[500px] overflow-y-auto">
        <p class="text-gray-400 text-sm">Carregando pedidos...</p>
      </div>
    </div>

  </main>

  <script>
    // TROCAR AQUI DEPOIS COM SUAS CHAVES DO SUPABASE
    const SUPABASE_URL = 'https://niedwjyzvmkgwfdwhacf.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_izTWyBI32u5erxhM0vzxeQ_4O7v92Yh'
    const { createClient } = supabase
    const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    let currentUser = null
    let services = []
    let selectedService = null

    // Checa se tá logado, se não volta pro login
    _supabase.auth.getSession().then(({ data: { session } }) => {
      if (!session) window.location.href = 'index.html'
      else {
        currentUser = session.user
        init()
      }
    })

    async function init() {
      await loadProfile()
      await loadServices()
      await loadOrders()
    }

    async function loadProfile() {
      const { data, error } = await _supabase.from('smm.profiles').select('balance').eq('id', currentUser.id).single()
      if (error) console.log('Erro ao carregar perfil:', error)
      document.getElementById('balance').textContent = parseFloat(data?.balance || 0).toFixed(2).replace('.', ',')
    }

    async function loadServices() {
      const { data, error } = await _supabase.from('smm.services').select('*').eq('is_active', true)

      if (error) {
        console.log('ERRO SUPABASE:', error)
        document.getElementById('category').innerHTML = '<option>Erro: ' + error.message + '</option>'
        showMsg('Erro ao carregar serviços: ' + error.message)
        return
      }

      if (!data || data.length === 0) {
        document.getElementById('category').innerHTML = '<option>Nenhum serviço encontrado</option>'
        showMsg('Nenhum serviço ativo no banco. Rode o SQL de INSERT.', true)
        return
      }

      services = data
      const categories = [...new Set(services.map(s => s.category))]
      document.getElementById('category').innerHTML = '<option value="">Selecione</option>' + categories.map(c => `<option>${c}</option>`).join('')
    }

    document.getElementById('category').addEventListener('change', (e) => {
      const filtered = services.filter(s => s.category === e.target.value)
      document.getElementById('service').innerHTML = '<option value="">Selecione</option>' + filtered.map(s => `<option value="${s.id}">${s.name}</option>`).join('')
      document.getElementById('limits').textContent = ''
      document.getElementById('total').textContent = '0,00'
      selectedService = null
    })

    document.getElementById('service').addEventListener('change', (e) => {
      selectedService = services.find(s => s.id == e.target.value)
      if (selectedService) {
        document.getElementById('limits').textContent = `Min: ${selectedService.min_order} | Max: ${selectedService.max_order}`
        document.getElementById('quantity').min = selectedService.min_order
        document.getElementById('quantity').max = selectedService.max_order
        document.getElementById('quantity').value = selectedService.min_order
        calcTotal()
      }
    })

    document.getElementById('quantity').addEventListener('input', calcTotal)

    function calcTotal() {
      const qty = document.getElementById('quantity').value
      if (!selectedService ||!qty) return document.getElementById('total').textContent = '0,00'
      const total = (qty / 1000) * selectedService.rate_per_1000
      document.getElementById('total').textContent = total.toFixed(2).replace('.', ',')
    }

    document.getElementById('order-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      if (!selectedService) return showMsg('Selecione um serviço')

      const qty = parseInt(document.getElementById('quantity').value)
      const charge = (qty / 1000) * selectedService.rate_per_1000

      const { error } = await _supabase.from('smm.orders').insert({
        user_id: currentUser.id,
        service_id: selectedService.id,
        link: document.getElementById('link').value,
        quantity: qty,
        charge: charge
      })

      if (error) showMsg(error.message)
      else {
        showMsg('Pedido enviado com sucesso!', false)
        e.target.reset()
        document.getElementById('total').textContent = '0,00'
        document.getElementById('limits').textContent = ''
        document.getElementById('service').innerHTML = '<option>Selecione categoria</option>'
        selectedService = null
        await loadProfile()
        await loadOrders()
      }
    })

    async function loadOrders() {
      const { data, error } = await _supabase
     .from('smm.orders')
     .select('*, smm.services(name)')
     .eq('user_id', currentUser.id)
     .order('created_at', { ascending: false })
     .limit(15)

      if (error) console.log('Erro ao carregar pedidos:', error)

      const list = document.getElementById('orders-list')
      if (!data || data.length === 0) {
        list.innerHTML = '<p class="text-gray-400 text-sm">Você ainda não fez pedidos</p>'
        return
      }

      list.innerHTML = data.map(o => `
        <div class="bg-gray-800 p-3 rounded-lg text-sm border border-gray-700">
          <div class="flex justify-between items-start">
            <span class="font-semibold">${o.smm.services?.name || 'Serviço removido'}</span>
            <span class="text-xs px-2 py-1 rounded ${o.status === 'completed'? 'bg-green-900 text-green-300' : o.status === 'pending'? 'bg-yellow-900 text-yellow-300' : o.status === 'processing'? 'bg-blue-900 text-blue-300' : 'bg-gray-700 text-gray-300'}">${o.status}</span>
          </div>
          <p class="text-gray-400 text-xs mt-1">Qtd: ${o.quantity} | R$ ${parseFloat(o.charge).toFixed(2)}</p>
        </div>
      `).join('')
    }

    function showMsg(text, error = true) {
      const msgDiv = document.getElementById('msg')
      msgDiv.textContent = text
      msgDiv.className = `text-sm p-3 rounded-lg ${error? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300'}`
      msgDiv.classList.remove('hidden')
      setTimeout(() => msgDiv.classList.add('hidden'), 5000)
    }

    document.getElementById('logout').onclick = async () => {
      await _supabase.auth.signOut()
      window.location.href = 'index.html'
    }
  </script>
</body>
</html>
