<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <title>YouTube Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Roboto', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }
    .logo { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
    .logo span { color: #ff0000; }
    .sub { color: #aaa; margin-bottom: 30px; font-size: 14px; }
    .loader {
      border: 3px solid #333;
      border-top: 3px solid #ff0000;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 0.8s linear infinite;
      margin-bottom: 30px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .apoio {
      background: #00c851;
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      margin: 5px;
      display: inline-block;
    }
    .info {
      position: fixed;
      bottom: 15px;
      font-size: 11px;
      color: #666;
      max-width: 300px;
    }
  </style>
  
  <script>
    let tempo = 3;
    function atualizar() {
      document.getElementById('contador').innerText = tempo;
      tempo--;
      if (tempo < 0) {
        // Força o YouTube a abrir no modo escuro
        window.location.replace("https://www.youtube.com/?theme=dark&app=m");
      } else {
        setTimeout(atualizar, 1000);
      }
    }
    window.onload = atualizar;
  </script>
</head>
<body>
  <div class="logo">YouTube <span>Lite</span></div>
  <p class="sub">Versão otimizada e mantida pela comunidade</p>
  
  <div class="loader"></div>
  <p>Entrando em <span id="contador">3</span>s...</p>
  
  <div style="margin-top: 40px;">
    <a href="https://livepix.gg/rtmods" class="apoio">
      💚 Apoiar com Pix
    </a>
  </div>
  
  <p class="info">
    Este projeto é gratuito. Apoie para mantermos os servidores.
  </p>
</body>
</html>
