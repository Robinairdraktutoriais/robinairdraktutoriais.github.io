<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortador YouTube</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 500px; margin: 50px auto; padding: 0 20px; background: #0d1117; color: #c9d1d9; }
    h1 { color: #f0f6fc; }
    input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #c9d1d9; font-size: 16px; box-sizing: border-box; }
    button { background: #238636; border: none; cursor: pointer; font-weight: 600; }
    button:hover { background: #2ea043; }
    .row { display: flex; gap: 10px; }
    .row input { flex: 1; }
    .info { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 14px; }
    a { color: #58a6ff; }
    code { background: #161b22; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Cortar YouTube igual Termux</h1>
  <p>Usa <code>yt-dlp + ffmpeg</code> rodando no Github Actions</p>

  <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=..." >
  <div class="row">
    <input id="inicio" type="text" placeholder="Início 00:01:30" value="00:00:00">
    <input id="duracao" type="text" placeholder="Duração 00:00:30" value="00:00:30">
  </div>
  <input id="nome" type="text" placeholder="Nome do arquivo" value="corte.mp4">
  
  <button onclick="disparar()">Cortar Vídeo</button>

  <div class="info">
    <strong>Como funciona:</strong><br>
    1. Clica em "Cortar Vídeo" pra abrir o Github<br>
    2. Confirma em "Run workflow"<br>
    3. Espera ~2min e baixa em "Artifacts"<br><br>
    <strong>Link direto do Actions:</strong><br>
    <a id="linkActions" href="#" target="_blank">Abrir aba Actions do repo</a>
  </div>

  <script>
    // TROCA AQUI PELO SEU USUARIO/REPO
    const REPO = "seu-usuario/seu-repo"; 
    
    document.getElementById('linkActions').href = `https://github.com/${REPO}/actions`;
    
    function disparar() {
      const url = document.getElementById('url').value;
      const inicio = document.getElementById('inicio').value;
      const duracao = document.getElementById('duracao').value;
      const nome = document.getElementById('nome').value;
      
      if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
        return alert('Cola um link válido do YouTube');
      }
      
      // Link que já preenche tudo no Github
      const linkWorkflow = `https://github.com/${REPO}/actions/workflows/cortar.yml`;
      window.open(linkWorkflow, '_blank');
      
      alert(`Agora no Github:\n1. Clica em "Run workflow"\n2. Cola o link: ${url}\n3. Início: ${inicio}\n4. Duração: ${duracao}\n5. Nome: ${nome}\n6. Clica no botão verde "Run workflow"`);
    }
  </script>
</body>
</html>
