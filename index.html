<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel SMM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f1419] text-gray-100 min-h-screen">

  <!-- TELA DE LOGIN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-[#1a1f26] border border-[#2a2f36] rounded-xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white">Painel SMM</h1>
        <p class="text-gray-400 mt-2">Acesse sua conta</p>
      </div>

      <form id="auth-form" class="space-y-4">
        <input type="email" id="email" required placeholder="seu@email.com" class="w-full px-4 py-3 bg-[#0f1419] border border-[#2a2f36] rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white">
        <input type="password" id="password" required minlength="6" placeholder="Sua senha" class="w-full px-4 py-3 bg-[#0f1419] border border-[#2a2f36] rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white">
        <div id="message" class="hidden text-sm p-3 rounded-lg"></div>
        <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">Entrar</button>
        <button type="button" id="signup-btn" class="w-full bg-[#0f1419] hover:bg-[#1a1f26] text-white font-semibold py-3 rounded-lg transition border border-[#2a2f36]">Criar conta gratuita</button>
      </form>
    </div>
  </div>

  <!-- PAINEL LOGADO -->
  <div id="dashboard-screen" class="hidden">
    <!-- HEADER -->
    <div class="bg-[#1a1f26] border-b border-[#2a2f36]">
      <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center gap-3">
        <div class="flex-1 min-w-0">
          <h1 class="text-2xl font-bold text-white">Painel SMM</h1>
          <p class="text-gray-400 text-sm truncate" id="user-email"></p>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <div class="text-right mr-1">
            <p class="text-gray-400 text-xs">Saldo</p>
            <p class="text-green-400 font-bold text-lg leading-tight">R$ <span id="saldo-valor">0,00</span></p>
          </div>
          <button class="bg-[#2a2f36] text-white px-3 py-2 rounded-lg text-sm font-medium">ID</button>
          <button onclick="scrollToSaldo()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition font-semibold text-sm whitespace-nowrap">+ Saldo</button>
          <button id="logout-btn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition text-sm">Sair</button>
        </div>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="max-w-6xl mx-auto p-4 space-y-4">
      
      <!-- CARD ADICIONAR SALDO -->
      <div id="card-saldo" class="bg-[#1a1f26] border border-[#2a2f36] rounded-xl p-6">
        <h2 class="text-xl font-semibold text-white mb-4">Adicionar Saldo via Pix</h2>
        
        <div class="grid grid-cols-4 gap-2 mb-4">
          <button onclick="setValor(10)" class="bg-[#2a2f36] hover:bg-[#343a42] py-2.5 rounded-lg transition text-sm">R$ 10</button>
          <button onclick="setValor(20)" class="bg-[#2a2f36] hover:bg-[#343a42] py-2.5 rounded-lg transition text-sm">R$ 20</button>
          <button onclick="setValor(50)" class="bg-[#2a2f36] hover:bg-[#343a42] py-2.5 rounded-lg transition text-sm">R$ 50</button>
          <button onclick="setValor(100)" class="bg-[#2a2f36] hover:bg-[#343a42] py-2.5 rounded-lg transition text-sm">R$ 100</button>
        </div>

        <div class="flex gap-2">
          <input type="number" id="valor-input" placeholder="Ou digite outro valor" min="5" step="0.01" class="flex-1 px-4 py-3 bg-[#0f1419] border border-[#2a2f36] rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white">
          <button id="gerar-pix-btn" onclick="gerarPix()" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-lg transition whitespace-nowrap">Gerar Pix</button>
        </div>

        <div id="pix-area" class="hidden bg-[#0f1419] border border-[#2a2f36] rounded-lg p-6 text-center mt-4">
          <p class="text-gray-400 text-sm mb-3">Escaneie o QR Code ou use o Copia e Cola</p>
          <img id="qr-code-img" class="mx-auto mb-4 bg-white p-2 rounded-lg" width="250">
          <textarea id="qr-code-text" rows="3" readonly class="w-full px-3 py-2 bg-[#1a1f26] border border-[#2a2f36] rounded-lg text-white text-xs mb-3"></textarea>
          <button onclick="copiarPix()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition text-sm">Copiar código Pix</button>
          <p class="text-yellow-400 text-xs mt-4">⏱️ Aguardando pagamento... O saldo é creditado automaticamente em até 30s</p>
        </div>

        <div id="pix-message" class="hidden text-sm p-3 rounded-lg mt-4"></div>
      </div>

      <!-- FAZER NOVO PEDIDO -->
      <div class="bg-[#1a1f26] border border-[#2a2f36] rounded-xl p-6">
        <h2 class="text-xl font-semibold text-white mb-4">Fazer Novo Pedido</h2>
        
        <div class="space-y-4">
          <div>
            <label class="text-gray-300 text-sm mb-1.5 block">Categoria</label>
            <select id="categoria" onchange="carregarServicos()" class="w-full px-4 py-3 bg-[#0f1419] border border-[#2a2f36] rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white">
              <option value="">Selecione</option>
              <option value="instagram">Instagram</option>
              <option value="tiktok">TikTok</option>
              <option value="youtube">YouTube</option>
              <option value="facebook">Facebook</option>
            </select>
          </div>

          <div>
            <label class="text-gray-300 text-sm mb-1.5 block">Serviço</label>
            <select id="servico" onchange="calcularPreco()" class="w-full px-4 py-3 bg-[#0f1419] border border-[#2a2f36] rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white">
              <option value="">Selecione categoria</option>
            </select>
          </div>

          <div>
            <label class="text-gray-300 text-sm mb-1.5 block">Link do perfil/post</label>
            <input type="text" id="link" placeholder="https://instagram.com/..." class="w-full px-4 py-3 bg-[#0f1419] border border-[#2a2f36] rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white">
          </div>

          <div>
            <label class="text-gray-300 text-sm mb-1.5 block">Quantidade</label>
            <input type="number" id="quantidade" oninput="calcularPreco()" min="100" placeholder="Mínimo 100" class="w-full px-4 py-3 bg-[#0f1419] border border-[#2a2f36] rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-white">
          </div>

          <div class="bg-[#0f1419] border border-[#2a2f36] rounded-lg p-4 flex justify-between items-center">
            <div>
              <p class="text-gray-400 text-sm">Você pagará</p>
              <p class="text-blue-400 font-bold text-2xl">R$ <span id="valor-pedido">0,00</span></p>
            </div>
            <button onclick="enviarPedido()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-lg transition">Enviar Pedido</button>
          </div>
          <div id="pedido-msg" class="hidden text-sm p-3 rounded-lg"></div>
        </div>
      </div>

      <!-- ÚLTIMOS PEDIDOS -->
      <div class="bg-[#1a1f26] border border-[#2a2f36] rounded-xl p-6">
        <h2 class="text-xl font-semibold text-white mb-4">Últimos Pedidos</h2>
        <div id="lista-pedidos">
          <p class="text-gray-400 text-center py-8">Nenhum pedido ainda</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://niedwjyzvmkgwfdwhacf.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_izTWyBI32u5erxhM0vzxeQ_4O7v92Yh'
    const SUPABASE_FUNCTION_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pZWR3anl6dm1rZ3dmZHdoYWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ0MzQ0MTIsImV4cCI6MjA3MDAxMDQxMn0.pIr6g27ClVzWQhVbcnpH4nvkVskzUJOCzzX14xWEhKg'

    const { createClient } = supabase
    const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const SERVICOS = {
      instagram: [
        { id: 'ig-seguidores', nome: 'Seguidores Instagram', preco: 12.50 },
        { id: 'ig-curtidas', nome: 'Curtidas Instagram', preco: 2.00 },
        { id: 'ig-views', nome: 'Visualizações Stories', preco: 1.50 }
      ],
      tiktok: [
        { id: 'tt-seguidores', nome: 'Seguidores TikTok', preco: 15.00 },
        { id: 'tt-curtidas', nome: 'Curtidas TikTok', preco: 3.00 },
        { id: 'tt-views', nome: 'Visualizações TikTok', preco: 0.80 }
      ],
      youtube: [
        { id: 'yt-inscritos', nome: 'Inscritos YouTube', preco: 25.00 },
        { id: 'yt-views', nome: 'Visualizações YouTube', preco: 5.00 },
        { id: 'yt-likes', nome: 'Likes YouTube', preco: 8.00 }
      ],
      facebook: [
        { id: 'fb-curtidas', nome: 'Curtidas Página', preco: 10.00 },
        { id: 'fb-seguidores', nome: 'Seguidores Facebook', preco: 18.00 }
      ]
    }

    const loginScreen = document.getElementById('login-screen')
    const dashboardScreen = document.getElementById('dashboard-screen')
    const authForm = document.getElementById('auth-form')
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const loginBtn = document.getElementById('login-btn')
    const signupBtn = document.getElementById('signup-btn')
    const logoutBtn = document.getElementById('logout-btn')
    const messageDiv = document.getElementById('message')
    const pixMessageDiv = document.getElementById('pix-message')
    const userEmailEl = document.getElementById('user-email')
    const saldoValorEl = document.getElementById('saldo-valor')
    const valorInput = document.getElementById('valor-input')
    const pixArea = document.getElementById('pix-area')
    const gerarPixBtn = document.getElementById('gerar-pix-btn')
    const pedidoMsg = document.getElementById('pedido-msg')

    let currentUser = null
    let saldoInterval = null
    let servicoSelecionado = null

    function scrollToSaldo() {
      document.getElementById('card-saldo').scrollIntoView({ behavior: 'smooth', block: 'start' })
    }

    function showMsg(text, error = true) {
      messageDiv.textContent = text
      messageDiv.className = `text-sm p-3 rounded-lg ${error ? 'bg-red-900/50 text-red-300 border border-red-800' : 'bg-green-900/50 text-green-300 border border-green-800'}`
      messageDiv.classList.remove('hidden')
    }

    function showPixMsg(text, error = true) {
      pixMessageDiv.textContent = text
      pixMessageDiv.className = `text-sm p-3 rounded-lg mt-4 ${error ? 'bg-red-900/50 text-red-300 border border-red-800' : 'bg-green-900/50 text-green-300 border border-green-800'}`
      pixMessageDiv.classList.remove('hidden')
    }

    function showPedidoMsg(text, error = true) {
      pedidoMsg.textContent = text
      pedidoMsg.className = `text-sm p-3 rounded-lg ${error ? 'bg-red-900/50 text-red-300 border border-red-800' : 'bg-green-900/50 text-green-300 border border-green-800'}`
      pedidoMsg.classList.remove('hidden')
      setTimeout(() => pedidoMsg.classList.add('hidden'), 3000)
    }

    function carregarServicos() {
      const cat = document.getElementById('categoria').value
      const servicoSelect = document.getElementById('servico')
      if (!cat) {
        servicoSelect.innerHTML = '<option value="">Selecione categoria</option>'
        return
      }
      servicoSelect.innerHTML = '<option value="">Selecione o serviço</option>'
      SERVICOS[cat].forEach(s => {
        servicoSelect.innerHTML += `<option value="${s.id}" data-preco="${s.preco}">${s.nome} - R$ ${s.preco.toFixed(2)}/1000</option>`
      })
    }

    function calcularPreco() {
      const servicoSelect = document.getElementById('servico')
      const qtd = parseInt(document.getElementById('quantidade').value) || 0
      const opt = servicoSelect.options[servicoSelect.selectedIndex]
      if (!opt.value || qtd < 100) {
        document.getElementById('valor-pedido').textContent = '0,00'
        servicoSelecionado = null
        return
      }
      const precoPor1000 = parseFloat(opt.dataset.preco)
      const valor = (qtd / 1000) * precoPor1000
      document.getElementById('valor-pedido').textContent = valor.toFixed(2).replace('.', ',')
      servicoSelecionado = { id: opt.value, nome: opt.text.split(' - ')[0], preco: precoPor1000 }
    }

    _supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) showDashboard(session.user)
    })

    _supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN') showDashboard(session.user)
      else if (event === 'SIGNED_OUT') showLogin()
    })

    function showDashboard(user) {
      currentUser = user
      userEmailEl.textContent = user.email
      loginScreen.classList.add('hidden')
      dashboardScreen.classList.remove('hidden')
      carregarSaldo()
      carregarPedidos()
    }

    function showLogin() {
      currentUser = null
      dashboardScreen.classList.add('hidden')
      loginScreen.classList.remove('hidden')
      if (saldoInterval) clearInterval(saldoInterval)
    }

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault()
      loginBtn.disabled = true
      loginBtn.textContent = 'Entrando...'
      const { error } = await _supabase.auth.signInWithPassword({
        email: emailInput.value,
        password: passwordInput.value,
      })
      if (error) {
        showMsg(error.message === 'Invalid login credentials' ? 'Email ou senha incorretos' : error.message)
        loginBtn.disabled = false
        loginBtn.textContent = 'Entrar'
      }
    })

    signupBtn.addEventListener('click', async () => {
      if (!emailInput.value || !passwordInput.value) return showMsg('Preencha email e senha')
      signupBtn.disabled = true
      signupBtn.textContent = 'Criando...'
      const { data, error } = await _supabase.auth.signUp({
        email: emailInput.value,
        password: passwordInput.value,
      })
      if (error) {
        showMsg(error.message)
      } else {
        await _supabase.from('usuarios').insert({ id: data.user.id, email: data.user.email, saldo: 0 })
        showMsg('Conta criada! Faça login agora.', false)
      }
      signupBtn.disabled = false
      signupBtn.textContent = 'Criar conta gratuita'
    })

    logoutBtn.addEventListener('click', async () => {
      await _supabase.auth.signOut()
    })

    async function carregarSaldo() {
      const { data } = await _supabase.from('usuarios').select('saldo').eq('id', currentUser.id).single()
      if (data) saldoValorEl.textContent = Number(data.saldo).toFixed(2).replace('.', ',')
    }

    async function carregarPedidos() {
      const { data } = await _supabase.from('pedidos').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(5)
      const listaPedidos = document.getElementById('lista-pedidos')
      if (!data || data.length === 0) {
        listaPedidos.innerHTML = '<p class="text-gray-400 text-center py-8">Nenhum pedido ainda</p>'
        return
      }
      listaPedidos.innerHTML = data.map(p => `
        <div class="bg-[#0f1419] border border-[#2a2f36] rounded-lg p-4">
          <div class="flex justify-between items-start mb-2">
            <div>
              <p class="text-white font-semibold">${p.servico || 'Pedido'}</p>
              <p class="text-gray-400 text-sm truncate max-w-xs">${p.link || ''}</p>
            </div>
            <span class="px-3 py-1 rounded-full text-xs ${
              p.status === 'completo' ? 'bg-green-900 text-green-300' : 
              p.status === 'processando' ? 'bg-yellow-900 text-yellow-300' : 
              'bg-gray-700 text-gray-300'
            }">${p.status || 'pendente'}</span>
          </div>
          <div class="flex gap-4 text-sm text-gray-400">
            <span>Qtd: ${p.quantidade || 0}</span>
            <span>Valor: R$ ${Number(p.valor || 0).toFixed(2)}</span>
          </div>
        </div>
      `).join('')
    }

    function setValor(valor) {
      valorInput.value = valor
    }

    async function gerarPix() {
      const valor = parseFloat(valorInput.value)
      if (!valor || valor < 5) {
        showPixMsg('Valor mínimo é R$ 5,00')
        return
      }
      gerarPixBtn.disabled = true
      gerarPixBtn.textContent = 'Gerando...'
      pixMessageDiv.classList.add('hidden')
      pixArea.classList.add('hidden')

      try {
        const { data, error } = await _supabase.functions.invoke('criar-pagamento', {
          body: { valor: valor, email: currentUser.email },
          headers: { Authorization: `Bearer ${SUPABASE_FUNCTION_KEY}` }
        })
        if (error) throw new Error(error.message)
        if (data.error) throw new Error(data.error)
        document.getElementById('qr-code-img').src = `data:image/jpeg;base64,${data.qr_code_base64}`
        document.getElementById('qr-code-text').value = data.qr_code
        pixArea.classList.remove('hidden')
        if (saldoInterval) clearInterval(saldoInterval)
        saldoInterval = setInterval(carregarSaldo, 3000)
      } catch (err) {
        showPixMsg('Erro ao gerar Pix: ' + err.message)
      } finally {
        gerarPixBtn.disabled = false
        gerarPixBtn.textContent = 'Gerar Pix'
      }
    }

    function copiarPix() {
      const input = document.getElementById('qr-code-text')
      input.select()
      document.execCommand('copy')
      showPixMsg('Código Pix copiado!', false)
    }

    async function enviarPedido() {
      if (!servicoSelecionado) return showPedidoMsg('Selecione um serviço')
      const qtd = parseInt(document.getElementById('quantidade').value)
      const link = document.getElementById('link').value
      if (qtd < 100) return showPedidoMsg('Quantidade mínima: 100')
      if (!link) return showPedidoMsg('Informe o link')
      const valor = (qtd / 1000) * servicoSelecionado.preco
      const { data: userData } = await _supabase.from('usuarios').select('saldo').eq('id', currentUser.id).single()
      if (userData.saldo < valor) return showPedidoMsg('Saldo insuficiente. Adicione saldo.')
      const { error } = await _supabase.from('pedidos').insert({
        user_id: currentUser.id, servico: servicoSelecionado.nome, link: link, quantidade: qtd, valor: valor, status: 'pendente'
      })
      if (error) {
        showPedidoMsg('Erro ao criar pedido')
      } else {
        await _supabase.from('usuarios').update({ saldo: userData.saldo - valor }).eq('id', currentUser.id)
        showPedidoMsg('Pedido enviado com sucesso!', false)
        document.getElementById('quantidade').value = ''
        document.getElementById('link').value = ''
        document.getElementById('valor-pedido').textContent = '0,00'
        carregarSaldo()
        carregarPedidos()
      }
    }
  </script>
</body>
</html>
