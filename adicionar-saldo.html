<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionar Saldo - SMM Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4">
  <div class="max-w-md mx-auto">
    <header class="bg-white p-4 rounded-xl shadow-md mb-4 flex justify-between items-center">
      <h1 class="text-lg font-bold">Adicionar Saldo</h1>
      <a href="painel.html" class="text-blue-600 text-sm">Voltar</a>
    </header>

    <div class="bg-white p-6 rounded-xl shadow-md">
      <div class="mb-4">
        <p class="text-sm text-slate-500">Saldo atual</p>
        <p class="text-2xl font-bold text-green-600">R$ <span id="saldo">0,00</span></p>
      </div>

      <form id="addForm" class="space-y-4">
        <div>
          <label class="text-sm font-medium">Valor para adicionar</label>
          <div class="grid grid-cols-4 gap-2 mt-2 mb-2">
            <button type="button" onclick="setValor(5)" class="border p-2 rounded hover:bg-slate-100">R$ 5</button>
            <button type="button" onclick="setValor(10)" class="border p-2 rounded hover:bg-slate-100">R$ 10</button>
            <button type="button" onclick="setValor(20)" class="border p-2 rounded hover:bg-slate-100">R$ 20</button>
            <button type="button" onclick="setValor(50)" class="border p-2 rounded hover:bg-slate-100">R$ 50</button>
          </div>
          <input id="valor" type="number" min="5" step="0.01" placeholder="Ou digite outro valor" class="w-full p-2 border rounded" required oninput="calcularTaxa()">
          <div id="taxaInfo" class="text-sm text-slate-700 mt-3 p-3 bg-slate-50 rounded-lg hidden"></div>
        </div>
        <button id="btnSubmit" type="submit" class="w-full bg-green-600 text-white p-3 rounded-lg font-semibold">Gerar Pix</button>
      </form>

      <div id="pixArea" class="hidden mt-6 text-center">
        <p class="text-sm mb-2">Escaneie o QR Code ou copie o código:</p>
        <img id="qrCode" class="mx-auto mb-3 border p-2 rounded-lg">
        <input id="pixCopia" readonly class="w-full p-2 border rounded text-xs mb-2">
        <button onclick="copiarPix()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">Copiar Código Pix</button>
        <p class="text-xs text-slate-500 mt-3">O saldo é creditado automaticamente após o pagamento</p>
      </div>
    </div>
  </div>

<script>
  const { createClient } = supabase
  const _supabase = createClient('https://niedwjyzvmkgwfdwhacf.supabase.co', 'sb_publishable_izTWyBI32u5erxhM0vzxeQ_4O7v92Yh')
  
  let user = null

  // TAXA DO MP: 0,99% + R$ 0,40 pro Pix
  const TAXA_FIXA = 0.40
  const TAXA_PERCENT = 0.0099

  async function init() {
    const { data: { session } } = await _supabase.auth.getSession()
    if (!session) return window.location.href = 'index.html'
    user = session.user
    
    const { data: profile } = await _supabase.from('smm.profiles').select('balance').eq('id', user.id).single()
    if (profile) {
      document.getElementById('saldo').textContent = profile.balance.toFixed(2).replace('.', ',')
    }
  }

  function setValor(v) {
    document.getElementById('valor').value = v
    calcularTaxa()
  }

  function calcularTaxa() {
    const valorDesejado = parseFloat(document.getElementById('valor').value) || 0
    const taxaInfo = document.getElementById('taxaInfo')
    
    if (valorDesejado < 5) {
      taxaInfo.classList.add('hidden')
      return { valorDesejado: 0, valorCobrado: 0 }
    }
    
    // Fórmula inversa: quanto cobrar pra sobrar valorDesejado depois da taxa
    const valorCobrado = (valorDesejado + TAXA_FIXA) / (1 - TAXA_PERCENT)
    const taxaTotal = valorCobrado - valorDesejado

    taxaInfo.classList.remove('hidden')
    taxaInfo.innerHTML = `
      <div class="flex justify-between"><span>Você receberá:</span> <b>R$ ${valorDesejado.toFixed(2)}</b></div>
      <div class="flex justify-between"><span>Taxa Mercado Pago:</span> <span>R$ ${taxaTotal.toFixed(2)}</span></div>
      <hr class="my-1">
      <div class="flex justify-between font-bold text-green-700"><span>Total a pagar:</span> <span>R$ ${valorCobrado.toFixed(2)}</span></div>
    `
    
    return { valorDesejado, valorCobrado }
  }

  function copiarPix() {
    document.getElementById('pixCopia').select()
    document.execCommand('copy')
    alert('Código Pix copiado!')
  }

  document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = document.getElementById('btnSubmit')
    const { valorDesejado, valorCobrado } = calcularTaxa()
    
    if (valorDesejado < 5) {
      alert('Valor mínimo de saldo: R$ 5,00')
      return
    }

    const confirmar = confirm(`Confirmar pagamento de R$ ${valorCobrado.toFixed(2)} para receber R$ ${valorDesejado.toFixed(2)} de saldo?`)
    if (!confirmar) return

    btn.disabled = true
    btn.innerText = 'Gerando Pix...'

    try {
      const { data, error } = await _supabase.functions.invoke('criar-pagamento', {
        body: { 
          valor: valorCobrado.toFixed(2), // Manda o valor COM TAXA
          email_cliente: user.email
        }
      })

      if (error) throw error
      if (data.error) throw new Error(data.error)

      document.getElementById('qrCode').src = `data:image/png;base64,${data.qr_code_base64}`
      document.getElementById('pixCopia').value = data.qr_code
      document.getElementById('pixArea').classList.remove('hidden')
      
      await _supabase.from('smm_transactions').insert({
        user_id: user.id,
        type: 'deposit',
        amount: valorDesejado, // Salva o valor SEM TAXA
        description: `Depósito Pix - Pagará R$ ${valorCobrado.toFixed(2)}`,
        status: 'pending',
        mp_payment_id: data.id
      })

    } catch (err) {
      alert('Erro ao gerar Pix: ' + err.message)
      console.error(err)
    } finally {
      btn.disabled = false
      btn.innerText = 'Gerar Pix'
    }
  })

  init()
</script>
</body>
</html>
