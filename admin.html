<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin - Painel Completo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(20, 20, 35, 0.6);
      --border: rgba(139, 92, 246, 0.2);
      --primary: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(at 20% 80%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 80% 20%, rgba(34, 211, 238, 0.1) 0px, transparent 50%);
      min-height: 100vh;
      color: var(--text);
      padding: 24px;
    }
  .container { max-width: 1400px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    h1 { font-size: 1.8rem; background: linear-gradient(90deg, #8b5cf6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .live { display: flex; align-items: center; gap: 8px; color: var(--green); font-size: 0.9rem; }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  
  /* Abas */
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { 
      padding: 12px 20px; 
      background: transparent; 
      border: none; 
      color: var(--muted); 
      cursor: pointer; 
      border-bottom: 2px solid transparent;
      font-size: 0.95rem;
      font-weight: 500;
    }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
      gap: 16px; 
      margin-bottom: 24px; 
    }
  .stat-card { 
      background: var(--card); 
      border: 1px solid var(--border); 
      backdrop-filter: blur(20px); 
      padding: 20px; 
      border-radius: 16px; 
    }
  .stat-card span { color: var(--muted); font-size: 0.85rem; }
  .stat-card h2 { font-size: 2.2rem; margin-top: 8px; color: var(--primary); }
  .table-wrap { 
      background: var(--card); 
      border: 1px solid var(--border); 
      backdrop-filter: blur(20px); 
      border-radius: 16px; 
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 480px; }
    th { 
      text-align: left; 
      padding: 12px 6px; 
      color: var(--muted); 
      font-size: 0.65rem; 
      text-transform: uppercase; 
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { 
      padding: 12px 6px; 
      border-bottom: 1px solid rgba(139, 92, 246, 0.05);
      font-size: 0.75rem;
    }
    td:first-child, th:first-child { padding-left: 12px; }
    td:last-child, th:last-child { padding-right: 12px; }
    tr:hover { background: rgba(139, 92, 246, 0.05); }
  .status-online { color: var(--green); font-weight: 600; }
  .status-offline { color: var(--red); }
  .user-badge { 
      background: rgba(139, 92, 246, 0.15); 
      color: var(--primary); 
      padding: 2px 8px; 
      border-radius: 20px; 
      font-size: 0.7rem;
      display: inline-block;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  .loading { text-align:center; padding: 40px; color: var(--muted); }
  .email-cell { max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
   
    @media (max-width: 640px) {
     .hide-mobile { display: none; }
      table { min-width: 320px; }
    }

  .login-box {
      max-width: 400px;
      margin: 15vh auto;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
    }
  .login-box h2 { margin-bottom: 24px; font-size: 1.5rem; }
  .login-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
    }
  .login-box button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #8b5cf6, #22d3ee);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
  .login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: var(--red); font-size: 0.9rem; margin-top: 12px; }
  .logout { 
      background: rgba(239, 68, 68, 0.2); 
      color: #ef4444; 
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
  .logout:hover { background: rgba(239, 68, 68, 0.3); }
  .btn-action { 
      background: rgba(139, 92, 246, 0.2); 
      color: var(--primary); 
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-right: 4px;
    }
  .btn-action:hover { background: rgba(139, 92, 246, 0.3); }
  </style>
</head>
<body>
  <div id="app"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://niedwjyzvmkgwfdwhacf.supabase.co',
    'sb_publishable_izTWyBI32u5erxhM0vzxeQ_4O7v92Yh'
  )

  const app = document.getElementById('app')
  let currentTab = 'monitor'

  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    renderLogin()
  } else {
    const isAdmin = session.user.email === 'robinultimate23@gmail.com' || session.user.user_metadata?.role === 'admin'
    if (isAdmin) {
      renderDashboard(session.user)
    } else {
      renderNoAccess(session.user.email)
    }
  }

  function renderLogin() {
    app.innerHTML = `
      <div class="login-box">
        <h2>Login Admin</h2>
        <input type="email" id="email" placeholder="Email" value="robinultimate23@gmail.com">
        <input type="password" id="password" placeholder="Senha">
        <button id="btnLogin">Entrar</button>
        <div class="error" id="error"></div>
      </div>
    `

    document.getElementById('btnLogin').onclick = async () => {
      const btn = document.getElementById('btnLogin')
      const errorDiv = document.getElementById('error')
      btn.disabled = true
      btn.textContent = 'Entrando...'
      errorDiv.textContent = ''

      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { data, error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        errorDiv.textContent = error.message
        btn.disabled = false
        btn.textContent = 'Entrar'
        return
      }

      const isAdmin = data.user.email === 'robinultimate23@gmail.com' || data.user.user_metadata?.role === 'admin'
      if (isAdmin) {
        renderDashboard(data.user)
      } else {
        await supabase.auth.signOut()
        renderNoAccess(data.user.email)
      }
    }
  }

  function renderNoAccess(email) {
    app.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:16px;color:#e2e8f0;font-family:system-ui;padding:20px;text-align:center">
        <h1>Acesso negado</h1>
        <p style="color:#64748b">Logado como: ${email}</p>
        <p style="color:#64748b">Mas não tem permissão de admin</p>
        <button onclick="location.reload()" class="logout">Tentar novamente</button>
      </div>
    `
  }

  function renderDashboard(user) {
    app.innerHTML = `
      <div class="container">
        <div class="header">
          <h1>Painel Admin</h1>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="live"><div class="live-dot"></div> Online</div>
            <button class="logout" id="btnLogout">Sair</button>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="monitor">Monitor</button>
          <button class="tab" data-tab="pedidos">Pedidos</button>
          <button class="tab" data-tab="usuarios">Usuários</button>
        </div>

        <div id="tab-monitor" class="tab-content active"></div>
        <div id="tab-pedidos" class="tab-content"></div>
        <div id="tab-usuarios" class="tab-content"></div>
      </div>
    `

    document.getElementById('btnLogout').onclick = async () => {
      await supabase.auth.signOut()
      location.reload()
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => switchTab(tab.dataset.tab)
    })

    renderMonitor()
  }

  function switchTab(tab) {
    currentTab = tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active')
    document.getElementById(`tab-${tab}`).classList.add('active')

    if (tab === 'monitor') renderMonitor()
    if (tab === 'pedidos') renderPedidos()
    if (tab === 'usuarios') renderUsuarios()
  }

  async function renderMonitor() {
    const container = document.getElementById('tab-monitor')
    container.innerHTML = `
      <div class="grid">
        <div class="stat-card">
          <span>Online Agora</span>
          <h2 id="online-count">0</h2>
        </div>
        <div class="stat-card">
          <span>Logins Hoje</span>
          <h2 id="hoje-count">0</h2>
        </div>
        <div class="stat-card">
          <span>Total de Usuários</span>
          <h2 id="total-count">0</h2>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Usuário</th>
              <th>Email</th>
              <th class="hide-mobile">IP</th>
              <th class="hide-mobile">Dispositivo</th>
              <th>Último Acesso</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tabela-monitor">
            <tr><td colspan="6" class="loading">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    `
    carregarMonitor()
  }

  async function carregarMonitor() {
    await supabase.rpc('limpar_offline')

    const { data: usuarios, error } = await supabase
    .from('usuarios_online')
    .select('*')
    .order('ultimo_acesso', { ascending: false })
    .limit(100)

    if (error) {
      console.error(error)
      document.getElementById('tabela-monitor').innerHTML = `<tr><td colspan="6" class="loading">Erro: ${error.message}</td></tr>`
      return
    }

    const online = usuarios.filter(u => u.status === 'online').length
    const hoje = usuarios.filter(u => {
      const data = new Date(u.ultimo_acesso)
      const agora = new Date()
      return data.toDateString() === agora.toDateString()
    }).length

    document.getElementById('online-count').textContent = online
    document.getElementById('hoje-count').textContent = hoje
    document.getElementById('total-count').textContent = usuarios.length

    const tbody = document.getElementById('tabela-monitor')
    if (usuarios.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="loading">Nenhum usuário registrado ainda</td></tr>`
      return
    }

    tbody.innerHTML = usuarios.map(u => `
      <tr>
        <td><span class="user-badge" title="${u.username || '-'}">${u.username || '-'}</span></td>
        <td class="email-cell" title="${u.email}">${u.email || '-'}</td>
        <td class="hide-mobile" title="${u.ip}">${u.ip || '-'}</td>
        <td class="hide-mobile">${u.navegador? u.navegador.split(' ')[0] : '-'}</td>
        <td>${new Date(u.ultimo_acesso).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        <td class="status-${u.status}">${u.status.toUpperCase()}</td>
      </tr>
    `).join('')
  }

  async function renderPedidos() {
    const container = document.getElementById('tab-pedidos')
    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Cliente</th>
              <th>Serviço</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-pedidos">
            <tr><td colspan="7" class="loading">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    `
    carregarPedidos()
  }

  async function carregarPedidos() {
    const { data: pedidos, error } = await supabase
    .from('pedidos')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(100)

    if (error) {
      document.getElementById('tabela-pedidos').innerHTML = `<tr><td colspan="7" class="loading">Erro: ${error.message}</td></tr>`
      return
    }

    const tbody = document.getElementById('tabela-pedidos')
    if (pedidos.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="loading">Nenhum pedido ainda</td></tr>`
      return
    }

    tbody.innerHTML = pedidos.map(p => `
      <tr>
        <td>#${p.id}</td>
        <td>${p.cliente || '-'}</td>
        <td>${p.servico || '-'}</td>
        <td>R$ ${p.valor || '0'}</td>
        <td>${p.status || 'Pendente'}</td>
        <td>${new Date(p.created_at).toLocaleDateString('pt-BR')}</td>
        <td>
          <button class="btn-action" onclick="window.verPedido(${p.id})">Ver</button>
        </td>
      </tr>
    `).join('')
  }

  async function renderUsuarios() {
    const container = document.getElementById('tab-usuarios')
    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-usuarios">
            <tr><td colspan="5" class="loading">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    `
    carregarUsuarios()
  }

  async function carregarUsuarios() {
    const { data: usuarios, error } = await supabase
    .from('profiles')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(100)

    if (error) {
      document.getElementById('tabela-usuarios').innerHTML = `<tr><td colspan="5" class="loading">Erro: ${error.message}</td></tr>`
      return
    }

    const tbody = document.getElementById('tabela-usuarios')
    if (usuarios.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="loading">Nenhum usuário cadastrado</td></tr>`
      return
    }

    tbody.innerHTML = usuarios.map(u => `
      <tr>
        <td>${u.id.substring(0, 8)}...</td>
        <td>${u.username || u.full_name || '-'}</td>
        <td>${u.email || '-'}</td>
        <td>${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
        <td>
          <button class="btn-action" onclick="window.editarUsuario('${u.id}')">Editar</button>
        </td>
      </tr>
    `).join('')
  }

  // Realtime pro monitor
  supabase
  .channel('usuarios_online')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'usuarios_online' }, () => {
    if (currentTab === 'monitor') carregarMonitor()
  })
  .subscribe()

  // Funções globais pros botões
  window.verPedido = (id) => alert('Ver pedido #' + id)
  window.editarUsuario = (id) => alert('Editar usuário: ' + id)
</script>
</body>
</html>
