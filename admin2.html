<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin 2.0 - Usuários Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(20, 20, 35, 0.6);
      --border: rgba(139, 92, 246, 0.2);
      --primary: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(at 20% 80%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 80% 20%, rgba(34, 211, 238, 0.1) 0px, transparent 50%);
      min-height: 100vh;
      color: var(--text);
      padding: 12px;
    }
  .container { max-width: 1400px; margin: 0 auto; }
  .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 16px;
      gap: 8px;
    }
    h1 { 
      font-size: 1.2rem; 
      background: linear-gradient(90deg, #8b5cf6, #22d3ee); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }
  .live { 
      display: flex; 
      align-items: center; 
      gap: 4px; 
      color: var(--green); 
      font-size: 0.7rem;
      white-space: nowrap;
    }
  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    
  /* Cards SEMPRE lado a lado, até no iPhone SE */
  .grid { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 8px; 
      margin-bottom: 16px; 
    }
  .stat-card { 
      background: var(--card); 
      border: 1px solid var(--border); 
      backdrop-filter: blur(20px); 
      padding: 10px 8px; 
      border-radius: 10px; 
    }
  .stat-card span { 
      color: var(--muted); 
      font-size: 0.65rem;
      display: block;
      line-height: 1.1;
    }
  .stat-card h2 { 
      font-size: 1.4rem; 
      margin-top: 4px; 
      color: var(--primary);
      line-height: 1;
    }

    /* Aumenta tudo no tablet/desktop */
    @media (min-width: 768px) {
      body { padding: 24px; }
      .header { margin-bottom: 32px; }
      h1 { font-size: 1.8rem; }
      .live { font-size: 0.9rem; gap: 8px; }
      .live-dot { width: 8px; height: 8px; }
      .grid { gap: 16px; margin-bottom: 24px; }
      .stat-card { padding: 20px; border-radius: 16px; }
      .stat-card span { font-size: 0.85rem; }
      .stat-card h2 { font-size: 2.2rem; margin-top: 8px; }
    }

  .table-wrap { 
      background: var(--card); 
      border: 1px solid var(--border); 
      backdrop-filter: blur(20px); 
      border-radius: 12px; 
      overflow-x: auto;
    }
    table { 
      width: 100%; 
      border-collapse: collapse;
      min-width: 550px;
    }
    th { 
      text-align: left; 
      padding: 10px 6px; 
      color: var(--muted); 
      font-size: 0.65rem; 
      text-transform: uppercase; 
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { 
      padding: 10px 6px; 
      border-bottom: 1px solid rgba(139, 92, 246, 0.05);
      font-size: 0.8rem;
    }
    td:first-child, th:first-child { padding-left: 12px; }
    td:last-child, th:last-child { padding-right: 12px; }
    tr:hover { background: rgba(139, 92, 246, 0.05); }
  .status-online { color: var(--green); font-weight: 600; }
  .status-offline { color: var(--red); }
  .user-badge { 
      background: rgba(139, 92, 246, 0.15); 
      color: var(--primary); 
      padding: 2px 6px; 
      border-radius: 20px; 
      font-size: 0.7rem;
      display: inline-block;
    }
  .loading { text-align:center; padding: 30px; color: var(--muted); }
  .email-cell { max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
  
    @media (min-width: 768px) {
      table { min-width: 650px; }
      th { padding: 16px 8px; font-size: 0.8rem; }
      td { padding: 16px 8px; font-size: 0.85rem; }
      td:first-child, th:first-child { padding-left: 16px; }
      td:last-child, th:last-child { padding-right: 16px; }
      .user-badge { padding: 4px 12px; font-size: 0.85rem; }
      .email-cell { max-width: 120px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Monitor de Usuários</h1>
      <div class="live"><div class="live-dot"></div> Tempo Real</div>
    </div>

    <div class="grid">
      <div class="stat-card">
        <span>Online Agora</span>
        <h2 id="online-count">0</h2>
      </div>
      <div class="stat-card">
        <span>Logins Hoje</span>
        <h2 id="hoje-count">0</h2>
      </div>
      <div class="stat-card">
        <span>Total de Usuários</span>
        <h2 id="total-count">0</h2>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Usuário</th>
            <th>Email</th>
            <th>IP</th>
            <th>Dispositivo</th>
            <th>Último Acesso</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tabela">
          <tr><td colspan="6" class="loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://niedwjyzvmkgwfdwhacf.supabase.co',
    'sb_publishable_izTWyBI32u5erxhM0vzxeQ_4O7v92Yh'
  )

  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:16px;color:#e2e8f0;font-family:system-ui;padding:20px;text-align:center">
        <h1>Acesso negado</h1>
        <p style="color:#64748b">Você não está logado</p>
        <a href="/admin.html" style="color:#8b5cf6">Ir pro login</a>
      </div>
    `
    throw new Error('Sem sessão')
  }

  const user = session.user
  const isAdmin = user.email === 'robinultimate23@gmail.com' || user.user_metadata?.role === 'admin'

  if (!isAdmin) {
    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:16px;color:#e2e8f0;font-family:system-ui;padding:20px;text-align:center">
        <h1>Acesso negado</h1>
        <p style="color:#64748b">Logado como: ${user.email}</p>
        <p style="color:#64748b">Mas não tem permissão de admin</p>
      </div>
    `
    throw new Error('Não é admin')
  }

  async function carregarDados() {
    await supabase.rpc('limpar_offline')

    const { data: usuarios, error } = await supabase
    .from('usuarios_online')
    .select('*')
    .order('ultimo_acesso', { ascending: false })
    .limit(100)

    if (error) {
      console.error(error)
      document.getElementById('tabela').innerHTML = `<tr><td colspan="6" class="loading">Erro: ${error.message}</td></tr>`
      return
    }

    const online = usuarios.filter(u => u.status === 'online').length
    const hoje = usuarios.filter(u => {
      const data = new Date(u.ultimo_acesso)
      const agora = new Date()
      return data.toDateString() === agora.toDateString()
    }).length

    document.getElementById('online-count').textContent = online
    document.getElementById('hoje-count').textContent = hoje
    document.getElementById('total-count').textContent = usuarios.length

    const tbody = document.getElementById('tabela')
    if (usuarios.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="loading">Nenhum usuário registrado ainda</td></tr>`
      return
    }

    tbody.innerHTML = usuarios.map(u => `
      <tr>
        <td><span class="user-badge">${u.username || '-'}</span></td>
        <td class="email-cell" title="${u.email}">${u.email || '-'}</td>
        <td>${u.ip || '-'}</td>
        <td>${u.navegador? u.navegador.split(' ')[0] : '-'}</td>
        <td>${new Date(u.ultimo_acesso).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        <td class="status-${u.status}">${u.status.toUpperCase()}</td>
      </tr>
    `).join('')
  }

  carregarDados()

  supabase
  .channel('usuarios_online')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'usuarios_online' }, carregarDados)
  .subscribe()

</script>
</body>
</html>
